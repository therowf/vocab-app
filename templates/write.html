{% extends "base.html" %}
{% block title %}Write — Español{% endblock %}

{% block head %}
<style>
  .write-form textarea {
    width: 100%;
    height: 180px;
    padding: .75rem;
    font-size: 1rem;
    border: 1px solid #ccc;
    border-radius: 6px;
    resize: vertical;
    font-family: inherit;
    margin-bottom: 1rem;
  }
  .write-form textarea:focus {
    outline: none;
    border-color: #2d6a4f;
    box-shadow: 0 0 0 2px #b7e4c7;
  }
  .hint { font-size: .82rem; color: #666; margin-bottom: .8rem; }

  /* Progress */
  #progress-section { display: none; margin-top: .5rem; }
  .prog-label {
    display: flex; justify-content: space-between;
    font-size: .85rem; color: #444; margin-bottom: .4rem;
  }
  .prog-current { font-style: italic; color: #2d6a4f; }
  .prog-track {
    height: 12px; background: #ddd; border-radius: 6px; overflow: hidden; margin-bottom: 1rem;
  }
  .prog-fill {
    height: 100%; width: 0%; background: #40916c; border-radius: 6px;
    transition: width .25s ease;
  }

  /* Result */
  #result-section { display: none; }
  .result-box {
    background: #d8f3dc; border: 1px solid #95d5b2; border-radius: 8px;
    padding: 1rem 1.2rem; margin-bottom: 1rem;
  }
  .result-box.warn { background: #fff3cd; border-color: #ffe08a; }
  .result-box p { margin-bottom: .5rem; font-size: .95rem; color: #1b4332; }
  .result-box.warn p { color: #7d4e00; }
</style>
{% endblock %}

{% block content %}
<h1>Add Spanish Words</h1>
<p class="hint">Paste or type a Spanish paragraph. Each unique word will be translated and saved.</p>

<!-- Form -->
<div id="form-section">
  <form class="write-form" id="write-form" method="POST" action="{{ url_for('write_post') }}">
    <textarea name="paragraph" id="paragraph" placeholder="Escribe aquí…" autofocus></textarea>
    <button type="submit" class="btn btn-primary" id="submit-btn">Save Words</button>
  </form>
</div>

<!-- Progress -->
<div id="progress-section">
  <div class="prog-label">
    <span>Translating… <span class="prog-current" id="prog-word"></span></span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
</div>

<!-- Result -->
<div id="result-section">
  <div class="result-box" id="result-box">
    <p id="result-msg"></p>
  </div>
  <button class="btn btn-primary" id="write-more-btn">Write More</button>
</div>

<script>
(function () {
  const form        = document.getElementById('write-form');
  const formSection = document.getElementById('form-section');
  const progSection = document.getElementById('progress-section');
  const progFill    = document.getElementById('prog-fill');
  const progPct     = document.getElementById('prog-pct');
  const progWord    = document.getElementById('prog-word');
  const resultSection = document.getElementById('result-section');
  const resultBox   = document.getElementById('result-box');
  const resultMsg   = document.getElementById('result-msg');
  const writeMoreBtn = document.getElementById('write-more-btn');

  writeMoreBtn.addEventListener('click', () => {
    resultSection.style.display = 'none';
    progSection.style.display   = 'none';
    formSection.style.display   = 'block';
    progFill.style.width = '0%';
    progPct.textContent  = '0%';
    progWord.textContent = '';
    document.getElementById('paragraph').value = '';
    document.getElementById('paragraph').focus();
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const paragraph = document.getElementById('paragraph').value.trim();
    if (!paragraph) return;

    // Switch to progress view
    formSection.style.display   = 'none';
    progSection.style.display   = 'block';
    resultSection.style.display = 'none';
    progFill.style.width = '0%';
    progPct.textContent  = '0%';

    const formData = new FormData(form);
    let response;
    try {
      response = await fetch(form.action, { method: 'POST', body: formData });
    } catch (err) {
      showResult('Network error — please try again.', true);
      return;
    }

    const reader  = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      // Parse complete SSE lines
      const lines = buffer.split('\n');
      buffer = lines.pop(); // retain incomplete trailing chunk

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let data;
        try { data = JSON.parse(line.slice(6)); } catch { continue; }

        if (!data.done) {
          const pct = data.progress + '%';
          progFill.style.width = pct;
          progPct.textContent  = pct;
          progWord.textContent = data.current;
        } else {
          // 100% fill before showing result
          progFill.style.width = '100%';
          progPct.textContent  = '100%';
          progWord.textContent = '';

          setTimeout(() => {
            progSection.style.display = 'none';
            if (data.warning) {
              showResult(data.warning, true);
            } else {
              showResult(`${data.saved} new word(s) saved, ${data.skipped} already known.`, false);
            }
          }, 350);
        }
      }
    }
  });

  function showResult(msg, isWarn) {
    resultMsg.textContent = msg;
    resultBox.className   = 'result-box' + (isWarn ? ' warn' : '');
    resultSection.style.display = 'block';
  }
})();
</script>
{% endblock %}
